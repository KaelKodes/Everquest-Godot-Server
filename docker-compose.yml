services:
  eqmud-server:
    build: .
    ports:
      - "3005:3005"
    volumes:
      # Mount the entire source directory so code changes are picked up without rebuilding
      - .:/usr/src/app
      # Prevent host node_modules from overwriting the container's (different OS)
      - /usr/src/app/node_modules
    restart: unless-stopped
    command: ["node", "--watch", "index.js"]
